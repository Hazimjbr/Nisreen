<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الصغار - تحدي المشتري الذكي</title>
    <style>
        /* التنسيقات العامة */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdf0f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* واجهة التعليمات */
        #ui-bar { width: 800px; background-color: #8e44ad; color: white; padding: 15px 25px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); box-sizing: border-box; border: 3px solid #fff;}
        #instruction-text { font-size: 22px; font-weight: bold; color: #fff200; text-shadow: 1px 1px 2px #000; }
        .pulse-text { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* حاوية اللعبة */
        #game-container { width: 800px; height: 600px; background: linear-gradient(to bottom, #f7d9ea, #e8b4d6); border-radius: 20px; position: relative; transition: transform 1s ease-in-out; border: 8px solid #d385c9; box-shadow: 0 15px 30px rgba(0,0,0,0.2); overflow: hidden; }

        /* لافتة المتجر */
        .shop-banner { text-align: center; background-color: #b062b5; color: white; padding: 15px; font-size: 28px; font-weight: bold; border-bottom: 5px solid #8e44ad; }

        /* منطقة الفواكه */
        #fruits-area { display: flex; justify-content: space-around; margin-top: 20px; position: relative; z-index: 2;}
        .fruit-box { background-color: #e593cc; padding: 10px; border-radius: 15px; text-align: center; width: 130px; border: 3px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .fruit-box h3 { margin: 0 0 5px 0; color: #fff; font-size: 16px; text-shadow: 1px 1px 1px #000; }
        .fruit-item { font-size: 50px; cursor: pointer; user-select: none; transition: transform 0.2s; display: inline-block;}
        .fruit-item:hover { transform: scale(1.2); }
        
        .highlight-target { animation: glow 1s infinite alternate; border-color: #fff200 !important; }
        @keyframes glow { from { box-shadow: 0 0 5px #fff200; } to { box-shadow: 0 0 20px #fff200; } }

        /* الميزان (تم إنزاله للأسفل لمنع التداخل) */
        #scale-area { position: absolute; bottom: 100px; left: 80px; text-align: center; background: #fff; padding: 15px; border-radius: 15px; border: 4px solid #b062b5; box-shadow: 0 8px 15px rgba(0,0,0,0.2); z-index: 1;}
        #scale-plate { width: 140px; height: 60px; background-color: #e0e0e0; border-radius: 10px; margin: 0 auto 10px; border-bottom: 8px solid #95a5a6; display: flex; justify-content: center; align-items: flex-end; font-size: 30px; padding-bottom: 5px; box-sizing: border-box;}
        #scale-screen { background-color: #2c3e50; color: #00ff00; font-family: monospace; padding: 8px 15px; border-radius: 8px; font-size: 24px; font-weight: bold; border: 3px inset #7f8c8d; }

        /* منطقة الدفع (تبدأ صغيرة ومخفية، وتكبر عند الحاجة) */
        #payment-area { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 15px; background: #fff; padding: 15px; border-radius: 20px; border: 4px solid #b062b5; box-shadow: 0 8px 15px rgba(0,0,0,0.2); z-index: 5; 
            /* الخصائص المسؤولة عن تصغير الصندوق بالبداية */
            transform: scale(0.3); 
            transform-origin: bottom right; 
            opacity: 0.3; 
            pointer-events: none; 
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
        }
        /* الصنف الذي يتفعل بعد الوزن ليظهر الصندوق بحجمه الطبيعي */
        #payment-area.active { transform: scale(1); opacity: 1; pointer-events: auto; }
        
        .wallet { background-color: #f1c40f; padding: 15px; border-radius: 15px; display: flex; flex-wrap: wrap; width: 180px; gap: 8px; border: 3px solid #e67e22; justify-content: center; align-content: flex-start;}
        
        /* فئات النقود */
        .money-item { display: flex; justify-content: center; align-items: center; font-weight: bold; color: white; cursor: pointer; box-shadow: 0 3px 5px rgba(0,0,0,0.3); transition: transform 0.1s; text-shadow: 1px 1px 1px rgba(0,0,0,0.5);}
        .money-item:hover { transform: scale(1.1); }
        .money-item:active { transform: scale(0.9); }
        
        .val-1 { width: 35px; height: 35px; border-radius: 50%; background: radial-gradient(circle, #f1c40f, #e67e22); border: 2px solid #d35400; font-size: 18px;}
        .val-5 { width: 50px; height: 30px; border-radius: 5px; background: #e74c3c; border: 2px solid #c0392b; font-size: 16px;}
        .val-10 { width: 50px; height: 30px; border-radius: 5px; background: #3498db; border: 2px solid #2980b9; font-size: 16px;}
        .val-20 { width: 50px; height: 30px; border-radius: 5px; background: #2ecc71; border: 2px solid #27ae60; font-size: 16px;}

        #cash-register { width: 140px; background-color: #34495e; border-radius: 15px; text-align: center; color: white; padding: 15px; border: 4px solid #2c3e50; display: flex; flex-direction: column; justify-content: space-between;}
        #paid-amount-text { font-size: 24px; color: #2ecc71; font-weight: bold; background: #111; padding: 5px; border-radius: 5px; margin: 10px 0; border: 2px inset #555;}
        
        .btn-group { display: flex; flex-direction: column; gap: 5px; }
        #btn-pay { background-color: #27ae60; color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        #btn-pay:hover { background-color: #2ecc71;}
        #btn-reset { background-color: #e74c3c; color: white; border: none; padding: 5px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        #btn-reset:hover { background-color: #c0392b;}

        /* شاشات الرسائل */
        .overlay-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column;}
        .message-content { background: white; padding: 30px; border-radius: 20px; border: 5px solid #b062b5; text-align: center; font-size: 24px; font-weight: bold; box-shadow: 0 10px 40px rgba(0,0,0,0.5); max-width: 500px; line-height: 1.5; color: #333;}
        .btn-action { background-color: #8e44ad; color: white; border: none; padding: 12px 30px; margin-top: 20px; border-radius: 10px; cursor: pointer; font-size: 20px; font-weight: bold; transition: transform 0.2s;}
        .btn-action:hover { transform: scale(1.1); background-color: #9b59b6;}

        /* تقريب الكاميرا */
        .zoom-scale { transform: scale(1.5) translate(100px, -50px); }
        .zoom-payment { transform: scale(1.5) translate(-100px, -50px); }

        .flying-element { position: fixed; pointer-events: none; z-index: 1000; transition: all 0.4s ease-in-out; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="ui-bar">
            <span id="level-text">المرحلة: 1 / 5</span>
            <span id="instruction-text" class="pulse-text">اضغط على زر (ابدأ) للعب</span>
        </div>

        <div id="game-container">
            <div class="shop-banner">متجر الصغار 🌸</div>

            <div id="fruits-area">
                <div class="fruit-box" id="box-apple">
                    <h3>تفاح (2 دينار/كغم)</h3>
                    <div class="fruit-item" onclick="handleFruitClick('apple', this)">🍎</div>
                </div>
                <div class="fruit-box" id="box-lemon">
                    <h3>ليمون (3 دينار/كغم)</h3>
                    <div class="fruit-item" onclick="handleFruitClick('lemon', this)">🍋</div>
                </div>
                <div class="fruit-box" id="box-grape">
                    <h3>عنب (4 دينار/كغم)</h3>
                    <div class="fruit-item" onclick="handleFruitClick('grape', this)">🍇</div>
                </div>
            </div>

            <div id="scale-area">
                <h4>الميزان</h4>
                <div id="scale-plate"></div>
                <div id="scale-screen">0 كغم</div>
            </div>

            <div id="payment-area">
                <div class="wallet" id="wallet-coins"></div>
                <div id="cash-register">
                    <span>صندوق الدفع</span>
                    <div id="paid-amount-text">0</div>
                    <div class="btn-group">
                        <button id="btn-pay" onclick="checkPayment()">دفع الحساب</button>
                        <button id="btn-reset" onclick="resetPayment()">إفراغ الصندوق</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- شاشة البداية -->
        <div id="start-screen" class="overlay-box">
            <div class="message-content">
                أهلاً بك في متجر الصغار! 🛒<br><br>
                المطلوب منك:<br>
                1. اقرأ الطلب في الأعلى.<br>
                2. <b>انقر</b> على الفاكهة لوزنها.<br>
                3. عندما يظهر الصندوق، ادفع المبلغ المطلوب بدقة.<br>
                <button class="btn-action" onclick="initGame()">ابدأ اللعب الآن!</button>
            </div>
        </div>

        <!-- شاشة الرسائل -->
        <div id="message-screen" class="overlay-box" style="display: none;">
            <div class="message-content">
                <p id="msg-text"></p>
                <button class="btn-action" id="msg-btn" onclick="closeMessage()">متابعة</button>
            </div>
        </div>
    </div>

    <script>
        const levels = [
            { item: "apple", itemName: "تفاح 🍎", requiredKg: 1, pricePerKg: 2 },
            { item: "lemon", itemName: "ليمون 🍋", requiredKg: 2, pricePerKg: 3 },
            { item: "grape", itemName: "عنب 🍇", requiredKg: 1, pricePerKg: 4 },
            { item: "apple", itemName: "تفاح 🍎", requiredKg: 3, pricePerKg: 2 },
            { item: "lemon", itemName: "ليمون 🍋", requiredKg: 4, pricePerKg: 3 }
        ];

        let currentLevel = 0;
        let errorsCount = 0;
        let currentWeightOnScale = 0;
        let currentPaidAmount = 0;
        let gameState = "START"; 

        const instructionText = document.getElementById("instruction-text");
        const scaleScreen = document.getElementById("scale-screen");
        const scalePlate = document.getElementById("scale-plate");
        const gameContainer = document.getElementById("game-container");
        const paymentArea = document.getElementById("payment-area");
        const wallet = document.getElementById("wallet-coins");
        const paidAmountText = document.getElementById("paid-amount-text");

        function initGame() {
            document.getElementById("start-screen").style.display = "none";
            currentLevel = 0;
            errorsCount = 0;
            loadLevel();
        }

        function loadLevel() {
            if (currentLevel >= levels.length) {
                finishGame();
                return;
            }

            let levelData = levels[currentLevel];
            gameState = "WEIGHING";
            currentWeightOnScale = 0;
            currentPaidAmount = 0;
            
            // تهيئة المشهد
            scalePlate.innerHTML = '';
            scaleScreen.innerText = "0 كغم";
            paidAmountText.innerText = "0";
            gameContainer.className = ""; 
            paymentArea.classList.remove('active'); // إخفاء/تصغير الصندوق
            
            generateMoney(); // توليد النقود في المحفظة

            document.getElementById("level-text").innerText = `المرحلة: ${currentLevel + 1} / 5`;
            instructionText.innerText = `الطلب: نحتاج (${levelData.requiredKg} كغم) من الـ ${levelData.itemName}.`;
            
            document.querySelectorAll('.fruit-box').forEach(box => box.classList.remove('highlight-target'));
            document.getElementById(`box-${levelData.item}`).classList.add('highlight-target');
        }

        function handleFruitClick(fruitType, element) {
            if (gameState !== "WEIGHING") return;
            let levelData = levels[currentLevel];

            if (fruitType !== levelData.item) {
                showPopup("هذا الصنف غير مطلوب! ركز في الطلب بالأعلى.", true, true);
                return;
            }

            flyElement(element, scalePlate, false, () => {
                scalePlate.innerHTML += `<span style="font-size:20px;">${element.innerText}</span>`;
                currentWeightOnScale++;
                scaleScreen.innerText = `${currentWeightOnScale} كغم`;
                gameContainer.className = "zoom-scale"; 

                if (currentWeightOnScale === levelData.requiredKg) {
                    gameState = "PAYING";
                    document.getElementById(`box-${levelData.item}`).classList.remove('highlight-target');
                    
                    setTimeout(() => {
                        let totalCost = levelData.requiredKg * levelData.pricePerKg;
                        instructionText.innerText = `الحساب (${totalCost} دينار). ادفع المبلغ الصحيح في الصندوق.`;
                        
                        gameContainer.className = "zoom-payment"; 
                        paymentArea.classList.add('active'); // إظهار وتكبير صندوق الدفع!
                        
                    }, 800);
                } else if (currentWeightOnScale > levelData.requiredKg) {
                    errorsCount++;
                    showPopup("الوزن زائد! أعد المحاولة.", true);
                    setTimeout(loadLevel, 2000);
                }
            });
        }

        // توليد النقود حسب الفئات المطلوبة
        function generateMoney() {
            wallet.innerHTML = '';
            // 6 من فئة 1، 3 من فئة 5، 3 من فئة 10، 3 من فئة 20
            const moneyArray = [
                1,1,1,1,1,1, 
                5,5,5, 
                10,10,10, 
                20,20,20
            ];

            moneyArray.forEach(val => {
                let mny = document.createElement('div');
                mny.className = `money-item val-${val}`;
                mny.innerText = val;
                mny.onclick = function() { handleMoneyClick(this, val); };
                wallet.appendChild(mny);
            });
        }

        function handleMoneyClick(element, value) {
            if (gameState !== "PAYING") return;

            flyElement(element, document.getElementById('cash-register'), true, () => {
                element.style.display = "none";
                currentPaidAmount += value; // جمع قيمة الفئة
                paidAmountText.innerText = currentPaidAmount;
            });
        }

        // إفراغ الصندوق في حال أخطأ الطالب في العد
        function resetPayment() {
            if (gameState !== "PAYING") return;
            currentPaidAmount = 0;
            paidAmountText.innerText = "0";
            generateMoney(); // إعادة النقود للمحفظة
        }

        function checkPayment() {
            if (gameState !== "PAYING") return;

            let levelData = levels[currentLevel];
            let requiredAmount = levelData.requiredKg * levelData.pricePerKg;

            if (currentPaidAmount === requiredAmount) {
                showPopup("إجابة صحيحة! حساب دقيق يا بطل 🌟", false, true);
                currentLevel++;
                setTimeout(loadLevel, 2000);
            } else {
                errorsCount++;
                showPopup(`الحساب خاطئ! المجموع الصحيح هو ${requiredAmount} دينار. لقد قمت بإرجاع نقودك لتجرب مرة أخرى.`, true, true);
                resetPayment(); // إرجاع النقود ليعيد المحاولة
            }
        }

        function flyElement(sourceElement, targetContainer, isMoney, callback) {
            let rectSrc = sourceElement.getBoundingClientRect();
            let rectTar = targetContainer.getBoundingClientRect();
            
            let flyingClone = document.createElement('div');
            flyingClone.innerHTML = sourceElement.innerHTML;
            flyingClone.className = "flying-element " + (isMoney ? sourceElement.className : "");
            
            if(!isMoney) {
                flyingClone.style.fontSize = "40px";
            }

            flyingClone.style.left = rectSrc.left + "px";
            flyingClone.style.top = rectSrc.top + "px";
            document.body.appendChild(flyingClone);

            setTimeout(() => {
                flyingClone.style.left = (rectTar.left + rectTar.width/2 - 20) + "px";
                flyingClone.style.top = (rectTar.top + rectTar.height/2 - 20) + "px";
                flyingClone.style.opacity = "0.5";
                flyingClone.style.transform = "scale(0.5)";
            }, 20);

            setTimeout(() => {
                document.body.removeChild(flyingClone);
                if(callback) callback();
            }, 400);
        }

        let autoCloseTimer;
        function showPopup(text, isError, autoClose = false) {
            const messageScreen = document.getElementById("message-screen");
            const msgBtn = document.getElementById("msg-btn");
            
            document.getElementById("msg-text").innerHTML = text;
            messageScreen.style.display = "flex";
            msgBtn.style.display = autoClose ? "none" : "block";
            messageScreen.querySelector('.message-content').style.borderColor = isError ? "#e74c3c" : "#2ecc71";
            
            clearTimeout(autoCloseTimer);
            if(autoClose) {
                autoCloseTimer = setTimeout(closeMessage, 2500);
            }
        }

        function closeMessage() {
            document.getElementById("message-screen").style.display = "none";
        }

        function finishGame() {
            gameContainer.className = "";
            paymentArea.classList.remove('active');
            instructionText.innerText = "انتهت اللعبة!";
            
            let finalMsg = "";
            if (errorsCount === 0) {
                finalMsg = "🎉 إنجاز مذهل! 🎉<br><br>لقد أنهيت جميع المراحل بذكاء.<br>لقد حصلت على لقب:<br><br><b>⭐ (المشتري الذكي) ⭐</b>";
            } else {
                finalMsg = `عمل جيد!<br>لكنك أخطأت (${errorsCount}) مرات.<br><br>للحصول على لقب (المشتري الذكي) يجب ألا تخطئ في الحساب أبداً... هل تقبل التحدي من جديد؟`;
            }

            document.getElementById("msg-text").innerHTML = finalMsg;
            const messageScreen = document.getElementById("message-screen");
            messageScreen.querySelector('.message-content').style.borderColor = "#8e44ad";
            const msgBtn = document.getElementById("msg-btn");
            msgBtn.innerText = "العب من جديد";
            msgBtn.style.display = "inline-block";
            msgBtn.onclick = () => { closeMessage(); initGame(); };
            messageScreen.style.display = "flex";
        }
    </script>
</body>
</html>
